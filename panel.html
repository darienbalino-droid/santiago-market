<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <meta name="theme-color" content="#28a745">
    <title>Panel de Control - Santiago Market</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            padding: 20px;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        .container {
            max-width: 750px;
            width: 100%;
            margin: 0 auto;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 48px;
            padding: 35px 30px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        h1 { text-align: center; margin-bottom: 15px; font-size: 42px; }
        h1 span:first-child { color: #ffffff; }
        h1 span:last-child { color: #f1c40f; }
        .subtitle { color: #94a3b8; text-align: center; margin-bottom: 35px; font-size: 22px; }
        input, textarea, select {
            width: 100%;
            padding: 20px 24px;
            margin-bottom: 22px;
            background: #1e293b;
            border: 1.5px solid #334155;
            border-radius: 28px;
            color: white;
            font-size: 20px;
            outline: none;
        }
        input:focus, textarea:focus { border-color: #28a745; box-shadow: 0 0 0 3px rgba(40,167,69,0.3); }
        textarea { min-height: 120px; resize: vertical; font-size: 20px; }
        button {
            width: 100%;
            padding: 20px;
            background: linear-gradient(135deg, #28a745, #1f8b3a);
            border: none;
            border-radius: 60px;
            color: white;
            font-weight: bold;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.3s;
        }
        button:hover { transform: scale(1.02); }
        button:active { transform: scale(0.98); }
        .info-box {
            background: rgba(40,167,69,0.15);
            border: 2px solid #28a745;
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 25px;
            text-align: center;
            font-size: 20px;
        }
        .error { background: rgba(239,68,68,0.15); border-color: #ef4444; color: #ef4444; }
        .success { background: rgba(40,167,69,0.15); border-color: #28a745; color: #28a745; }
        .warning { background: rgba(241,196,15,0.15); border-color: #f1c40f; color: #f1c40f; }
        .hidden { display: none; }
        .campo { margin-bottom: 25px; }
        .campo label { display: block; font-size: 22px; font-weight: 700; color: #cbd5e1; margin-bottom: 12px; }
        hr { border-color: #334155; margin: 30px 0; }
        .btn-cerrar { background: #334155; margin-top: 15px; }
        .producto-item {
            background: #1e293b;
            border-radius: 24px;
            padding: 18px;
            margin-bottom: 16px;
            border: 1px solid #334155;
        }
        .producto-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .producto-header strong { color: #f1c40f; font-size: 18px; }
        .producto-inputs { display: flex; gap: 12px; flex-wrap: wrap; }
        .producto-inputs input { flex: 1; margin-bottom: 0; padding: 14px 16px; font-size: 18px; }
        .btn-eliminar { background: #ef4444; padding: 12px 20px; font-size: 16px; width: auto; border-radius: 35px; margin-top: 10px; }
        .btn-agregar { background: #28a745; padding: 18px; font-size: 20px; margin-top: 12px; border-radius: 50px; }
        .btn-activar { background: #f1c40f; color: #0f172a; margin-top: 10px; }
        .btn-renovar { background: #f1c40f; color: #0f172a; margin-top: 10px; }
        .volver-btn {
            text-align: right;
            margin-bottom: 20px;
        }
        .volver-btn a {
            color: #f1c40f;
            text-decoration: none;
            font-size: 18px;
            background: rgba(0,0,0,0.3);
            padding: 8px 18px;
            border-radius: 40px;
            display: inline-block;
        }
        .fotos-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        .foto-item-panel {
            position: relative;
            background: #1e293b;
            border-radius: 16px;
            padding: 8px;
            text-align: center;
        }
        .foto-item-panel img {
            width: 100%;
            height: 100px;
            object-fit: cover;
            border-radius: 12px;
        }
        .btn-eliminar-foto {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #ef4444;
            border: none;
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-eliminar-foto:active { transform: scale(0.9); }
        .foto-nueva-input {
            margin-top: 10px;
            padding: 12px;
            background: #334155;
            border-radius: 28px;
            color: white;
            width: 100%;
        }
        .helper-text {
            font-size: 14px;
            color: #94a3b8;
            margin-top: 8px;
        }
        .btn-galeria {
            background: #4285F4;
            margin-top: 5px;
            padding: 12px;
            font-size: 18px;
        }
        @media (max-width: 550px) {
            body { padding: 15px; }
            .container { padding: 25px 20px; }
            h1 { font-size: 32px; }
            .subtitle { font-size: 18px; }
            .campo label { font-size: 20px; }
            input, textarea, select { padding: 16px 18px; font-size: 18px; }
            button { padding: 18px; font-size: 22px; }
            .info-box { font-size: 18px; }
            .fotos-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = "https://kospieqzqwbjkjljchlu.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_wlulCYK54_osTvkhq5oNuA_PtRS5apR";
        const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const IMAGEN_POR_DEFECTO = "https://i.postimg.cc/RZTS3mg7/1774530222644.png";

        function comprimirFoto(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (e) => {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;
                        if (width > 600) { height = (height * 600) / width; width = 600; }
                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        canvas.toBlob((blob) => { resolve(blob); }, 'image/jpeg', 0.5);
                    };
                };
            });
        }
    </script>
</head>
<body>
    <div class="container">
        <div class="volver-btn">
            <a href="#" onclick="cerrarSesion()">← Volver a la tienda</a>
        </div>
        <h1><span>Panel de Control</span> <span>Santiago Market</span></h1>
        <p class="subtitle">Administra tu menú y promociones</p>
        
        <div id="loginSection">
            <input type="text" id="codigo" placeholder="Ingresa tu código de acceso" autocomplete="off">
            <button onclick="validarCodigo()">🔓 Acceder a mi negocio</button>
        </div>
        
        <div id="panelSection" class="hidden">
            <div id="infoNegocio" class="info-box"></div>
            <div id="mensajePlan" class="info-box warning hidden"></div>
            <div id="infoLimites" class="info-box"></div>
            
            <div class="campo">
                <label>📸 MIS FOTOS</label>
                <div id="fotosLista" class="fotos-grid"></div>
                <button class="btn-agregar" id="btnAgregarFoto" onclick="agregarFoto()" style="background: #4285F4;">+ Agregar nueva foto</button>
                <p class="helper-text" id="fotosHelperText">🖼️ Presiona ❌ para eliminar una foto. Puedes subir otra después según tu plan.</p>
            </div>
            
            <hr>
            
            <div class="campo">
                <label>🍽️ MIS PRODUCTOS (máximo según plan)</label>
                <div id="productosLista"></div>
                <button class="btn-agregar" id="btnAgregarProducto" onclick="agregarProducto()">+ Agregar producto</button>
            </div>
            
            <hr>
            
            <div class="campo">
                <label>🕒 HORARIO DE ATENCIÓN</label>
                <input type="text" id="horario" placeholder="Ej: Lunes a Domingo 9am - 9pm">
            </div>
            
            <div class="campo">
                <label>📍 DIRECCIÓN (para el mapa)</label>
                <input type="text" id="direccion" placeholder="Ej: Calle 5ta #123, Santiago de las Vegas">
                <p class="helper-text">✏️ Cambia la dirección y el mapa se actualizará automáticamente</p>
            </div>
            
            <button id="btnGuardar" onclick="guardarCambios()">💾 GUARDAR TODOS LOS CAMBIOS</button>
            <button class="btn-activar" onclick="activarConCodigo()">🎟️ ACTIVAR PLAN CON CÓDIGO</button>
            <button class="btn-cerrar" onclick="cerrarSesion()">🔒 Cerrar sesión</button>
        </div>
    </div>

    <script>
        let negocioIdActual = "", negocioDataActual = null, productosActuales = [];
        let fotosActuales = [];
        let modoAgregarFoto = false;

        const codigoTemp = localStorage.getItem('codigo_edicion_temp');
        const negocioIdTemp = localStorage.getItem('negocio_id_temp');

        if (codigoTemp) {
            document.getElementById('codigo').value = codigoTemp;
            localStorage.removeItem('codigo_edicion_temp');
            localStorage.removeItem('negocio_id_temp');
            setTimeout(() => validarCodigo(), 100);
        }

        function mostrarMensaje(msg, tipo) {
            const existing = document.querySelector('.info-mensaje');
            if (existing) existing.remove();
            if (tipo === "clear") return;
            const div = document.createElement('div');
            div.className = `info-box ${tipo === 'error' ? 'error' : tipo === 'success' ? 'success' : 'warning'}`;
            div.style.marginTop = '20px'; div.innerHTML = msg;
            div.classList.add('info-mensaje');
            document.querySelector('.container').appendChild(div);
            setTimeout(() => div.remove(), 4000);
        }

        function contarFotosActuales() {
            let count = 0;
            for (let i = 1; i <= 10; i++) {
                if (negocioDataActual && negocioDataActual[`foto${i}`] && negocioDataActual[`foto${i}`] !== "") {
                    count++;
                }
            }
            return count;
        }

        function obtenerPlanStorageLocal() {
            const fechaRegistro = localStorage.getItem(`fecha_registro_${negocioIdActual}`);
            if (!fechaRegistro) return { nombre: "Gratis", maxFotosGaleria: 5, cambiarFotosPorDia: 1, puedeEditar: true, maxProductos: 7 };
            
            const registro = new Date(fechaRegistro);
            const hoy = new Date();
            const diasTranscurridos = Math.floor((hoy - registro) / (1000 * 60 * 60 * 24));
            const planActivo = localStorage.getItem(`plan_${negocioIdActual}`);
            
            if (planActivo === 'basico') {
                const fechaPago = new Date(localStorage.getItem(`fecha_pago_${negocioIdActual}`));
                const diasRestantes = 30 - Math.floor((hoy - fechaPago) / (1000 * 60 * 60 * 24));
                if (diasRestantes > 0) {
                    return { nombre: "Básico", maxFotosGaleria: 6, cambiarFotosPorDia: 3, puedeEditar: true, maxProductos: 7 };
                }
            }
            
            if (planActivo === 'premium') {
                const fechaPago = new Date(localStorage.getItem(`fecha_pago_${negocioIdActual}`));
                const diasRestantes = 30 - Math.floor((hoy - fechaPago) / (1000 * 60 * 60 * 24));
                if (diasRestantes > 0) {
                    return { nombre: "Premium", maxFotosGaleria: 8, cambiarFotosPorDia: 5, puedeEditar: true, maxProductos: 15 };
                }
            }
            
            if (planActivo === 'exito_local') {
                const fechaPago = new Date(localStorage.getItem(`fecha_pago_${negocioIdActual}`));
                const diasRestantes = 40 - Math.floor((hoy - fechaPago) / (1000 * 60 * 60 * 24));
                if (diasRestantes > 0) {
                    return { nombre: "Éxito Local", maxFotosGaleria: 10, cambiarFotosPorDia: 10, puedeEditar: true, maxProductos: 15 };
                }
            }
            
            return { nombre: "Gratis", maxFotosGaleria: 5, cambiarFotosPorDia: 1, puedeEditar: true, maxProductos: 7 };
        }

        async function cargarFotos() {
            fotosActuales = [];
            for (let i = 1; i <= 10; i++) {
                const fotoUrl = negocioDataActual[`foto${i}`];
                if (fotoUrl && fotoUrl.trim() !== "") {
                    fotosActuales.push({ index: i, url: fotoUrl });
                }
            }
            renderizarFotos();
        }

        function puedeBorrarHoy() {
            const hoy = new Date().toISOString().split('T')[0];
            const key = `borrados_${negocioIdActual}_${hoy}`;
            const borradosHoy = parseInt(localStorage.getItem(key) || '0');
            const plan = obtenerPlanStorageLocal();
            return borradosHoy < plan.cambiarFotosPorDia;
        }

        function puedeAgregarHoy() {
            const hoy = new Date().toISOString().split('T')[0];
            const key = `agregados_${negocioIdActual}_${hoy}`;
            const agregadosHoy = parseInt(localStorage.getItem(key) || '0');
            const plan = obtenerPlanStorageLocal();
            const fotosActualesCount = contarFotosActuales();
            const fotosFaltantes = plan.maxFotosGaleria - fotosActualesCount;
            
            // Si todavía faltan fotos para llegar al límite, permitir agregar
            if (fotosFaltantes > 0) {
                return agregadosHoy < fotosFaltantes;
            }
            
            return agregadosHoy < plan.cambiarFotosPorDia;
        }

        function registrarBorrado() {
            const hoy = new Date().toISOString().split('T')[0];
            const key = `borrados_${negocioIdActual}_${hoy}`;
            const borradosHoy = parseInt(localStorage.getItem(key) || '0');
            localStorage.setItem(key, borradosHoy + 1);
        }

        function registrarAgregado() {
            const hoy = new Date().toISOString().split('T')[0];
            const key = `agregados_${negocioIdActual}_${hoy}`;
            const agregadosHoy = parseInt(localStorage.getItem(key) || '0');
            localStorage.setItem(key, agregadosHoy + 1);
        }

        function renderizarFotos() {
            const container = document.getElementById('fotosLista');
            if (!container) return;
            
            const plan = obtenerPlanStorageLocal();
            const maxFotos = plan.maxFotosGaleria;
            const cambiarPorDia = plan.cambiarFotosPorDia;
            const puedeBorrar = puedeBorrarHoy();
            const puedeAgregar = puedeAgregarHoy();
            const fotosActualesCount = contarFotosActuales();
            const fotosFaltantes = maxFotos - fotosActualesCount;
            
            const borradosKey = `borrados_${negocioIdActual}_${new Date().toISOString().split('T')[0]}`;
            const agregadosKey = `agregados_${negocioIdActual}_${new Date().toISOString().split('T')[0]}`;
            const borradosHoy = parseInt(localStorage.getItem(borradosKey) || '0');
            const agregadosHoy = parseInt(localStorage.getItem(agregadosKey) || '0');
            
            document.getElementById('fotosHelperText').innerHTML = `📸 ${fotosActualesCount}/${maxFotos} fotos | 🔄 Puedes cambiar ${cambiarPorDia} foto(s) por día | 🗑️ Hoy has borrado ${borradosHoy}/${cambiarPorDia} | ➕ Hoy has agregado ${agregadosHoy}/${fotosFaltantes > 0 ? fotosFaltantes : cambiarPorDia}`;
            
            if (fotosActualesCount === 0 && !modoAgregarFoto) {
                container.innerHTML = `<div class="info-box" style="padding: 20px; text-align: center;">📸 No tienes fotos aún. Presiona "+ Agregar nueva foto"</div>`;
            } else {
                let html = '<div class="fotos-grid">';
                fotosActuales.forEach((foto) => {
                    html += `
                        <div class="foto-item-panel">
                            <img src="${foto.url}" onerror="this.src='${IMAGEN_POR_DEFECTO}'">
                            <button class="btn-eliminar-foto" onclick="eliminarFoto(${foto.index})" ${!puedeBorrar ? 'disabled style="opacity:0.5;"' : ''}>❌</button>
                        </div>
                    `;
                });
                html += '</div>';
                container.innerHTML = html;
            }
            
            const btnAgregar = document.getElementById('btnAgregarFoto');
            if (btnAgregar) {
                if (fotosActualesCount >= maxFotos || modoAgregarFoto || !puedeAgregar) {
                    btnAgregar.style.display = 'none';
                } else {
                    btnAgregar.style.display = 'block';
                    btnAgregar.innerHTML = `+ Agregar nueva foto (te faltan ${fotosFaltantes})`;
                }
            }
            
            if (modoAgregarFoto) {
                const formHtml = `
                    <div class="foto-nueva-input">
                        <button onclick="abrirGaleriaPanel()" class="btn-galeria" style="margin-bottom: 10px;">📷 Seleccionar de Galería</button>
                        <div style="display: flex; gap: 10px;">
                            <button onclick="cancelarAgregarFoto()" style="flex:1; background: #ef4444; padding: 12px;">❌ Cancelar</button>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', formHtml);
            }
        }

        function agregarFoto() {
            const plan = obtenerPlanStorageLocal();
            const fotosActualesCount = contarFotosActuales();
            
            if (fotosActualesCount >= plan.maxFotosGaleria) {
                mostrarMensaje(`⚠️ Límite de ${plan.maxFotosGaleria} fotos alcanzado`, 'error');
                return;
            }
            
            if (!puedeAgregarHoy()) {
                const fotosFaltantes = plan.maxFotosGaleria - fotosActualesCount;
                mostrarMensaje(`⚠️ Solo puedes agregar ${fotosFaltantes} foto(s) hoy para llegar al límite. Vuelve mañana para agregar más.`, 'error');
                return;
            }
            
            modoAgregarFoto = true;
            renderizarFotos();
        }

        function cancelarAgregarFoto() {
            modoAgregarFoto = false;
            renderizarFotos();
        }

        async function eliminarFoto(index) {
            const plan = obtenerPlanStorageLocal();
            if (!puedeBorrarHoy()) {
                mostrarMensaje(`⚠️ Hoy ya usaste tus ${plan.cambiarFotosPorDia} cambios. Vuelve mañana.`, 'error');
                return;
            }
            if (!confirm('¿Eliminar esta foto permanentemente?')) return;
            
            mostrarMensaje("🗑️ Eliminando foto...", "info");
            
            try {
                const fotoUrl = negocioDataActual[`foto${index}`];
                if (fotoUrl && fotoUrl.includes('supabase')) {
                    const urlParts = fotoUrl.split('/');
                    const fileName = urlParts[urlParts.length - 1].split('?')[0];
                    if (fileName) {
                        await db.storage.from('negocios').remove([fileName]);
                    }
                }
                
                const updateData = {};
                updateData[`foto${index}`] = null;
                await db.from('negocios').update(updateData).eq('id', negocioIdActual);
                
                negocioDataActual[`foto${index}`] = null;
                registrarBorrado();
                await cargarFotos();
                mostrarMensaje("✅ Foto eliminada correctamente", "success");
            } catch (error) {
                console.error("Error eliminando foto:", error);
                mostrarMensaje("❌ Error al eliminar foto", "error");
            }
        }

        async function subirFotoYGuardar(file, slotIndex) {
            try {
                const fotoComprimida = await comprimirFoto(file);
                const nombreArchivo = `negocio_${negocioIdActual}_foto_${slotIndex}_${Date.now()}.jpg`;
                
                const { error: uploadError } = await db.storage.from('negocios').upload(nombreArchivo, fotoComprimida);
                if (uploadError) {
                    throw uploadError;
                }
                
                const { data: urlData } = db.storage.from('negocios').getPublicUrl(nombreArchivo);
                
                const updateData = {};
                updateData[`foto${slotIndex}`] = urlData.publicUrl;
                await db.from('negocios').update(updateData).eq('id', negocioIdActual);
                negocioDataActual[`foto${slotIndex}`] = urlData.publicUrl;
                
                registrarAgregado();
                return true;
            } catch (error) {
                console.error("Error subiendo foto:", error);
                return false;
            }
        }

        function abrirGaleriaPanel() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = async (e) => {
                if (e.target.files[0]) {
                    const file = e.target.files[0];
                    
                    let slotLibre = null;
                    for (let i = 1; i <= 10; i++) {
                        if (!negocioDataActual[`foto${i}`] || negocioDataActual[`foto${i}`] === "") {
                            slotLibre = i;
                            break;
                        }
                    }
                    
                    if (slotLibre) {
                        const success = await subirFotoYGuardar(file, slotLibre);
                        if (success) {
                            mostrarMensaje("✅ Foto agregada", "success");
                            await cargarFotos();
                            cancelarAgregarFoto();
                        } else {
                            mostrarMensaje("❌ Error al subir la foto", "error");
                        }
                    } else {
                        mostrarMensaje("⚠️ No hay espacio para más fotos", "error");
                    }
                }
            };
            input.click();
        }

        function verificarYBloquear() {
            const plan = obtenerPlanStorageLocal();
            if (!plan.puedeEditar) {
                document.getElementById('productosLista').style.pointerEvents = 'none';
                document.getElementById('horario').disabled = true;
                document.getElementById('direccion').disabled = true;
                document.getElementById('btnAgregarProducto').disabled = true;
                document.getElementById('btnGuardar').disabled = true;
                document.getElementById('btnAgregarProducto').style.opacity = '0.5';
                document.getElementById('btnGuardar').style.opacity = '0.5';
            } else {
                document.getElementById('productosLista').style.pointerEvents = 'auto';
                document.getElementById('horario').disabled = false;
                document.getElementById('direccion').disabled = false;
                document.getElementById('btnAgregarProducto').disabled = false;
                document.getElementById('btnGuardar').disabled = false;
                document.getElementById('btnAgregarProducto').style.opacity = '1';
                document.getElementById('btnGuardar').style.opacity = '1';
            }
            
            const fotosCount = contarFotosActuales();
            const planActual = obtenerPlanStorageLocal();
            
            document.getElementById('infoLimites').innerHTML = `
                📋 ${planActual.nombre} | 📸 ${fotosCount}/${planActual.maxFotosGaleria} fotos | 🔄 Cambiar ${planActual.cambiarFotosPorDia} foto(s)/día | 📦 ${productosActuales.length}/${planActual.maxProductos} productos
            `;
        }

        async function validarCodigo() {
            const codigoInput = document.getElementById('codigo').value.trim();
            if (!codigoInput) { mostrarMensaje("⚠️ Ingresa tu código", "error"); return; }
            mostrarMensaje("🔍 Buscando...", "info");
            
            try {
                const { data, error } = await db.from('negocios').select('*').eq('codigo', codigoInput);
                if (data && data.length > 0) {
                    negocioDataActual = data[0];
                    negocioIdActual = negocioDataActual.id;
                    
                    if (!localStorage.getItem(`fecha_registro_${negocioIdActual}`)) {
                        localStorage.setItem(`fecha_registro_${negocioIdActual}`, new Date().toISOString());
                    }
                    
                    document.getElementById('loginSection').classList.add('hidden');
                    document.getElementById('panelSection').classList.remove('hidden');
                    document.getElementById('horario').value = negocioDataActual.horario || "";
                    document.getElementById('direccion').value = negocioDataActual.direccion || "";
                    document.getElementById('infoNegocio').innerHTML = `<strong>${negocioDataActual.nombre}</strong>`;
                    
                    const { data: prods } = await db.from('Productos').select('*').eq('negocio_id', negocioIdActual);
                    productosActuales = prods || [];
                    renderizarProductos();
                    await cargarFotos();
                    verificarYBloquear();
                } else {
                    mostrarMensaje("❌ Código incorrecto", "error");
                }
            } catch (e) { mostrarMensaje("❌ Error", "error"); }
        }

        function renderizarProductos() {
            const container = document.getElementById('productosLista');
            container.innerHTML = '';
            productosActuales.forEach((p, i) => {
                const div = document.createElement('div');
                div.className = 'producto-item';
                div.innerHTML = `
                    <div class="producto-inputs">
                        <input type="text" placeholder="Nombre del producto" value="${escapeHtml(p.nombre || '')}" id="prod_nombre_${i}">
                        <input type="text" placeholder="Precio" value="${escapeHtml(p.precio || '')}" id="prod_precio_${i}">
                    </div>
                    <button class="btn-eliminar" onclick="eliminarProducto(${i})">🗑️ Eliminar</button>
                `;
                container.appendChild(div);
            });
        }

        function escapeHtml(str) {
            if (!str) return "";
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function actualizarProductosDesdeInputs() {
            for (let i = 0; i < productosActuales.length; i++) {
                const nombreInput = document.getElementById(`prod_nombre_${i}`);
                const precioInput = document.getElementById(`prod_precio_${i}`);
                if (nombreInput && precioInput) {
                    productosActuales[i].nombre = nombreInput.value;
                    productosActuales[i].precio = precioInput.value;
                }
            }
        }

        function agregarProducto() {
            const plan = obtenerPlanStorageLocal();
            if (productosActuales.length >= plan.maxProductos) {
                mostrarMensaje(`⚠️ Límite de ${plan.maxProductos} productos alcanzado`, "error");
                return;
            }
            productosActuales.push({ nombre: "Nuevo producto", precio: "0 CUP" });
            renderizarProductos();
            verificarYBloquear();
        }

        function eliminarProducto(index) {
            productosActuales.splice(index, 1);
            renderizarProductos();
            verificarYBloquear();
        }

        async function guardarCambios() {
            actualizarProductosDesdeInputs();
            mostrarMensaje("💾 Guardando...", "info");
            
            try {
                const horario = document.getElementById('horario').value;
                const direccion = document.getElementById('direccion').value;
                const linkGps = `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(direccion)}`;
                
                await db.from('negocios').update({ 
                    horario: horario,
                    direccion: direccion,
                    maps: linkGps
                }).eq('id', negocioIdActual);
                
                await db.from('Productos').delete().eq('negocio_id', negocioIdActual);
                
                for (let p of productosActuales) {
                    if (p.nombre && p.nombre.trim() !== "") {
                        await db.from('Productos').insert({ negocio_id: negocioIdActual, nombre: p.nombre, precio: p.precio });
                    }
                }
                
                negocioDataActual.direccion = direccion;
                negocioDataActual.maps = linkGps;
                
                mostrarMensaje("✅ Todo guardado correctamente", "success");
                verificarYBloquear();
            } catch (e) { 
                console.error(e);
                mostrarMensaje("❌ Error al guardar", "error"); 
            }
        }

        async function activarConCodigo() {
            const codigo = prompt("📱 Ingresa el código de activación que recibiste por WhatsApp:");
            if (!codigo) return;
            
            mostrarMensaje("🔍 Verificando código...", "info");
            
            try {
                const { data, error } = await db.from('codigos_activacion').select('*').eq('codigo', codigo).eq('usado', false);
                if (error) throw error;
                
                if (data && data.length > 0) {
                    const codigoData = data[0];
                    const plan = codigoData.plan;
                    localStorage.setItem(`plan_${negocioIdActual}`, plan);
                    localStorage.setItem(`fecha_pago_${negocioIdActual}`, new Date().toISOString());
                    await db.from('codigos_activacion').update({ usado: true, usado_en: new Date().toISOString(), negocio_id: negocioIdActual }).eq('codigo', codigo);
                    mostrarMensaje(`✅ Plan ${plan === 'basico' ? 'Básico' : plan === 'premium' ? 'Premium' : 'Éxito Local'} activado`, 'success');
                    setTimeout(() => location.reload(), 1500);
                } else {
                    mostrarMensaje("❌ Código inválido o ya usado", "error");
                }
            } catch (e) {
                console.error(e);
                mostrarMensaje("❌ Error al verificar código", "error");
            }
        }

        function cerrarSesion() { 
            localStorage.setItem('volviendo_formulario', 'true');
            window.location.href = 'index.html'; 
        }
    </script>
</body>
</html>
