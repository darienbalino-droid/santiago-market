<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inscribir Negocio - Santiago Market v8.0</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            overflow-x: hidden;
            width: 100%;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            font-family: 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            padding: 30px 20px;
            font-size: 18px;
        }
        .container {
            max-width: 750px;
            margin: 0 auto;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 40px 35px;
            border: 1px solid rgba(255,255,255,0.15);
        }
        h1 { color: #f1c40f; font-size: 46px; text-align: center; margin-bottom: 12px; }
        .subtitle { color: #94a3b8; text-align: center; margin-bottom: 40px; font-size: 24px; }
        label { display: block; margin-bottom: 14px; font-weight: 700; color: #e2e8f0; font-size: 22px; }
        input, textarea, select {
            width: 100%;
            padding: 20px 24px;
            margin-bottom: 28px;
            background: #1e293b;
            border: 1.5px solid #334155;
            border-radius: 28px;
            color: white;
            font-size: 20px;
            transition: all 0.2s;
        }
        input:focus, textarea:focus, select:focus { border-color: #28a745; box-shadow: 0 0 0 3px rgba(40,167,69,0.3); outline: none; }
        textarea { min-height: 140px; font-size: 20px; resize: vertical; }
        button {
            width: 100%;
            padding: 22px;
            background: linear-gradient(135deg, #28a745, #1f8b3a);
            border: none;
            border-radius: 60px;
            color: white;
            font-weight: bold;
            font-size: 26px;
            cursor: pointer;
            margin-top: 20px;
        }
        button:active { transform: scale(0.98); }
        .info-box {
            background: rgba(40,167,69,0.15);
            border: 2px solid #28a745;
            border-radius: 28px;
            padding: 24px;
            margin-top: 30px;
            text-align: center;
            display: none;
            font-size: 20px;
        }
        .error-box { background: rgba(239,68,68,0.15); border-color: #ef4444; color: #ef4444; }
        .success-box { background: rgba(40,167,69,0.15); border-color: #28a745; color: #28a745; }
        .codigo-box {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border-radius: 40px;
            padding: 30px;
            margin-top: 30px;
            text-align: center;
            border: 3px solid #f1c40f;
            display: none;
        }
        .codigo-box span {
            font-family: monospace;
            font-size: 48px;
            font-weight: bold;
            color: #f1c40f;
            background: #0f172a;
            padding: 18px 28px;
            border-radius: 28px;
            display: inline-block;
            margin: 18px 0;
        }
        .btn-wa {
            display: inline-block;
            background: #25D366;
            color: white;
            padding: 18px 32px;
            border-radius: 60px;
            text-decoration: none;
            font-weight: bold;
            font-size: 22px;
            margin-top: 20px;
        }
        .helper-text { font-size: 18px; color: #94a3b8; margin-top: -18px; margin-bottom: 22px; }
        hr { border-color: #334155; margin: 35px 0; }
        .volver { text-align: center; margin-top: 35px; }
        .volver a { color: #94a3b8; text-decoration: none; font-size: 20px; cursor: pointer; }
        .btn-secundario { background: #334155; margin-top: 15px; font-size: 22px; padding: 18px; }
        .foto-item {
            background: rgba(255,255,255,0.05);
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px dashed #28a745;
        }
        .preview-foto img {
            max-width: 120px;
            max-height: 120px;
            border-radius: 20px;
            margin-top: 15px;
            border: 3px solid #28a745;
            object-fit: cover;
        }
        @media (max-width: 550px) {
            body { padding: 15px; }
            .container { padding: 30px 22px; }
            h1 { font-size: 36px; }
            .subtitle { font-size: 20px; }
            label { font-size: 20px; }
            input, textarea, select { padding: 16px 18px; font-size: 18px; }
            button { font-size: 24px; padding: 18px; }
            .helper-text, .volver a { font-size: 16px; }
            .codigo-box span { font-size: 32px; }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="container">
        <h1>📝 Santiago Market</h1>
        <p class="subtitle">Inscribe tu negocio y comienza a vender</p>
        
        <form id="formInscripcion">
            <label>🏪 Nombre del Negocio *</label>
            <input type="text" id="nombreNegocio" placeholder="Ej: Cafetería La Esquina" required>
            
            <label>📂 Tipo de Negocio *</label>
            <select id="tipoNegocio">
                <option value="restaurante">🍽️ Restaurante / Cafetería</option>
                <option value="moda">👕 Ropa y Moda</option>
                <option value="ferreteria">🔧 Ferretería</option>
                <option value="taller">📱 Taller Celulares</option>
                <option value="ventacasa">🏠 Venta de Casa</option>
                <option value="mypime">🏪 Mypime</option>
                <option value="otros">📦 Otros</option>
            </select>
            
            <label>📍 Dirección Exacta *</label>
            <input type="text" id="direccion" placeholder="Ej: Calle 5ta #123, Santiago de las Vegas" required>
            <div class="helper-text">✏️ Escribe tu dirección completa. El mapa se generará automáticamente.</div>

            <label>📱 WhatsApp o teléfono *</label>
            <input type="tel" id="whatsapp" placeholder="Ej: 5352466224" required>
            <div class="helper-text">Incluye el código de país (53 para Cuba)</div>
            
            <label>🛍️ ¿Qué vendes o qué servicio ofreces?</label>
            <textarea id="queVendes" placeholder="Describe brevemente lo que ofreces..."></textarea>
            
            <label>🕒 Horarios de Atención</label>
            <input type="text" id="horarios" placeholder="Ej: Lunes a Domingo 9am - 9pm">
            
            <label>📸 FOTOS DE TU NEGOCIO (máximo 5)</label>
            <div id="fotosContainer"></div>
            <button type="button" onclick="agregarCampoFoto()" class="btn-secundario">+ Agregar otra foto</button>
            <p class="helper-text">📱 Toca para seleccionar fotos de tu galería. Máximo 5 fotos.</p>
            
            <label>💬 Tienen Mensajería</label>
            <select id="mensajeria">
                <option value="SI">✅ SI</option>
                <option value="NO">❌ NO</option>
            </select>
            
            <label>💰 Tipos de Pago</label>
            <select id="pagos">
                <option value="cup">CUP</option>
                <option value="usd">USD</option>
                <option value="ambos">Ambos</option>
            </select>
            
            <button type="button" onclick="enviarFormulario()">🚀 INSCRIBIR NEGOCIO</button>
        </form>
        
        <div id="mensajeResultado" class="info-box"></div>
        <div id="codigoResultado" class="codigo-box"></div>
        
        <hr>
        
        <div class="volver">
            <a href="#" onclick="cerrarFormularioYVolver()">← Volver a Santiago Market</a>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://kospieqzqwbjkjljchlu.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_wlulCYK54_osTvkhq5oNuA_PtRS5apR";
        const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        let fotosSeleccionadas = [];
        let contadorFotos = 0;
        const MAX_FOTOS = 5;

        async function comprimirFoto(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (e) => {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;
                        if (width > 800) { height = (height * 800) / width; width = 800; }
                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        canvas.toBlob((blob) => { resolve(blob); }, 'image/jpeg', 0.7);
                    };
                };
            });
        }
        
        async function subirFotoSupabase(file, negocioId, index) {
            if (!file) return null;
            try {
                const fotoComprimida = await comprimirFoto(file);
                const nombreArchivo = `negocio_${negocioId}_foto_${index + 1}.jpg`;
                const { data, error } = await db.storage.from('negocios').upload(nombreArchivo, fotoComprimida, { upsert: true });
                if (error) throw error;
                const { data: urlData } = db.storage.from('negocios').getPublicUrl(nombreArchivo);
                return urlData.publicUrl;
            } catch (error) {
                console.error("Error subiendo foto:", error);
                return null;
            }
        }

        function mostrarMensaje(msg, tipo) {
            const div = document.getElementById('mensajeResultado');
            div.style.display = 'block';
            div.className = `info-box ${tipo === 'error' ? 'error-box' : tipo === 'success' ? 'success-box' : ''}`;
            div.innerHTML = msg;
            if (tipo !== 'info') setTimeout(() => { div.style.display = 'none'; }, 6000);
        }
        
        function mostrarCodigo(codigo, nombre, whatsapp) {
            const div = document.getElementById('codigoResultado');
            const urlWA = `https://wa.me/${whatsapp}?text=${encodeURIComponent(`🎉 Tu negocio "${nombre}" ha sido registrado en Santiago Market. Tu código es: ${codigo}.`)}`;
            div.style.display = 'block';
            div.innerHTML = `
                <div style="font-size: 26px; font-weight: bold;">🎉 ¡REGISTRADO!</div>
                <span>${codigo}</span>
                <div style="font-size: 20px; margin: 15px 0;">Guarda este código para editar tu negocio</div>
                <a href="${urlWA}" target="_blank" class="btn-wa">📱 ENVIAR CÓDIGO POR WHATSAPP</a>
            `;
        }
        
        function previewFoto(input, index) {
            if (input.files && input.files[0]) {
                fotosSeleccionadas[index] = input.files[0];
                const reader = new FileReader();
                reader.onload = function(e) {
                    const preview = document.getElementById(`preview-${index}`);
                    if (preview) preview.innerHTML = `<img src="${e.target.result}" style="max-width: 120px; max-height: 120px; border-radius: 20px; margin-top: 15px; border: 3px solid #28a745; object-fit: cover;">`;
                }
                reader.readAsDataURL(input.files[0]);
            }
        }
        
        function agregarCampoFoto() {
            if (contadorFotos >= MAX_FOTOS) {
                mostrarMensaje(`📸 Máximo ${MAX_FOTOS} fotos`, "error");
                return;
            }
            const container = document.getElementById('fotosContainer');
            const nuevoCampo = document.createElement('div');
            nuevoCampo.className = 'foto-item';
            nuevoCampo.innerHTML = `
                <input type="file" accept="image/*" onchange="previewFoto(this, ${contadorFotos})">
                <div class="preview-foto" id="preview-${contadorFotos}"></div>
            `;
            container.appendChild(nuevoCampo);
            contadorFotos++;
        }
        
        async function enviarFormulario() {
            const nombre = document.getElementById('nombreNegocio').value.trim();
            const categoria = document.getElementById('tipoNegocio').value;
            const direccion = document.getElementById('direccion').value.trim();
            const whatsapp = document.getElementById('whatsapp').value.trim();
            const descripcion = document.getElementById('queVendes').value;
            const horario = document.getElementById('horarios').value;
            
            // Generar link de Google Maps DIRECTO a navegación (abre la app sin preguntar)
            const linkGps = `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(direccion)}`;
            
            if (!nombre || !direccion || !whatsapp) {
                mostrarMensaje("⚠️ Completa todos los campos obligatorios", "error");
                return;
            }
            
            mostrarMensaje("📤 Guardando negocio y subiendo fotos...", "info");
            
            try {
                const codigo = nombre.substring(0, 4).toUpperCase() + whatsapp.slice(-4) + Math.floor(Math.random() * 1000);
                
                const { data: negocioData, error: insertError } = await db
                    .from('negocios')
                    .insert({
                        nombre: nombre,
                        categoria: categoria,
                        direccion: direccion,
                        descripcion: descripcion,
                        horario: horario,
                        whatsapp: whatsapp,
                        codigo: codigo,
                        maps: linkGps
                    })
                    .select();
                
                if (insertError) throw insertError;
                
                const negocioId = negocioData[0].id;
                
                const fotosSubidas = [];
                for (let i = 0; i < fotosSeleccionadas.length; i++) {
                    if (fotosSeleccionadas[i]) {
                        const urlFoto = await subirFotoSupabase(fotosSeleccionadas[i], negocioId, i);
                        if (urlFoto) fotosSubidas.push(urlFoto);
                    }
                }
                
                if (fotosSubidas.length > 0) {
                    const updateData = {};
                    fotosSubidas.forEach((url, idx) => {
                        updateData[`foto${idx+1}`] = url;
                    });
                    await db.from('negocios').update(updateData).eq('id', negocioId);
                }
                
                mostrarMensaje("✅ ¡Registro exitoso con fotos!", "success");
                mostrarCodigo(codigo, nombre, whatsapp);
                
                document.getElementById('formInscripcion').reset();
                document.getElementById('fotosContainer').innerHTML = '';
                fotosSeleccionadas = [];
                contadorFotos = 0;
                agregarCampoFoto();
                
            } catch (error) {
                console.error("Error:", error);
                mostrarMensaje("❌ Error: " + error.message, "error");
            }
        }
        
        function cerrarFormularioYVolver() {
            window.location.href = 'index.html';
        }
        
        agregarCampoFoto();
    </script>
</body>
</html>
