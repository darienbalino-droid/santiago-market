<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inscribir Negocio - Santiago Market v8.0</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body class="formulario-body">
    <div class="formulario-container">
        <h1>📝 Santiago Market</h1>
        <p class="subtitle">Inscribe tu negocio</p>
        
        <div id="mensajeResultado" class="info-box"></div>
        <div id="codigoResultado" class="codigo-box"></div>
        
        <form id="formInscripcion">
            <label>🏪 Nombre del Negocio *</label>
            <input type="text" id="nombreNegocio" required>
            
            <label>📂 Tipo de Negocio *</label>
            <select id="tipoNegocio">
                <option value="restaurante">🍽️ Restaurante</option>
                <option value="moda">👕 Ropa y Moda</option>
                <option value="ferreteria">🔧 Ferretería</option>
                <option value="taller">📱 Taller Celulares</option>
                <option value="ventacasa">🏠 Venta de Casa</option>
                <option value="mypime">🏪 Mypime</option>
                <option value="otros">📦 Otros</option>
            </select>
            
            <label>📍 Dirección *</label>
            <input type="text" id="direccion" required>
            
            <label>📱 WhatsApp *</label>
            <input type="tel" id="whatsapp" placeholder="5352466224" required>
            
            <label>🛍️ ¿Qué vendes?</label>
            <textarea id="queVendes" rows="3"></textarea>
            
            <label>📅 Días de atención *</label>
            <select id="diasAtencion" multiple size="7" style="height: auto; min-height: 180px;">
                <option value="Lunes">Lunes</option>
                <option value="Martes">Martes</option>
                <option value="Miércoles">Miércoles</option>
                <option value="Jueves">Jueves</option>
                <option value="Viernes">Viernes</option>
                <option value="Sábado">Sábado</option>
                <option value="Domingo">Domingo</option>
            </select>
            <p class="helper-text">💡 Mantén presionado Ctrl (o Cmd en Mac) para seleccionar múltiples días</p>
            
            <label>🕒 Hora de apertura *</label>
            <input type="time" id="horaApertura" required>
            
            <label>🕒 Hora de cierre *</label>
            <input type="time" id="horaCierre" required>
            
            <label>📸 Fotos (máximo 5)</label>
            <div id="fotosContainer"></div>
            <button type="button" onclick="agregarCampoFoto()" class="btn-secundario">+ Agregar foto</button>
            
            <label>🗺️ UBICACIÓN EXACTA EN EL MAPA *</label>
            <div id="ubicacionAdvertencia" class="ubicacion-advertencia">
                ⚠️ IMPORTANTE: Debes mover el marcador 🟢 hasta la ubicación exacta de tu negocio
            </div>
            <div id="mapaUbicacion"></div>
            <input type="hidden" id="latitud" value="">
            <input type="hidden" id="longitud" value="">
            <div class="botones-ubicacion">
                <button type="button" onclick="obtenerUbicacionActual()" class="btn-ubicacion" style="background: #4285F4;">📍 Mi ubicación actual</button>
                <button type="button" onclick="centrarEnSantiago()" class="btn-ubicacion" style="background: #f1c40f; color:#0f172a;">🎯 Santiago de las Vegas</button>
            </div>
            <p class="helper-text-obligatorio">⚠️ OBLIGATORIO: Arrastra el marcador 🟢 hasta la ubicación exacta de tu negocio</p>
            
            <label>💬 Mensajería</label>
            <select id="mensajeria">
                <option value="SI">✅ SI</option>
                <option value="NO">❌ NO</option>
            </select>
            
            <label>💰 Pagos</label>
            <select id="pagos">
                <option value="cup">CUP</option>
                <option value="usd">USD</option>
                <option value="ambos">Ambos</option>
            </select>
            
            <button type="button" id="btnRegistrar" onclick="enviarFormulario()">🚀 INSCRIBIR</button>
        </form>
        
        <div class="volver">
            <a href="#" onclick="cerrarFormularioYVolver()">← Volver a la tienda</a>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://kospieqzqwbjkjljchlu.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_wlulCYK54_osTvkhq5oNuA_PtRS5apR";
        const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        let fotosSeleccionadas = [];
        let contadorFotos = 0;
        const MAX_FOTOS = 5;
        
        let mapaSeleccion;
        let marcadorSeleccion;
        let mapaInicializado = false;
        let ubicacionConfirmada = false;
        
        const centroSantiago = { lat: 22.9700, lng: -82.3869 };

        function comprimirFoto(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (e) => {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;
                        if (width > 800) {
                            height = (height * 800) / width;
                            width = 800;
                        }
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        canvas.toBlob((blob) => resolve(blob), 'image/jpeg', 0.7);
                    };
                };
            });
        }

        async function subirFotoYGuardarEnTabla(file, negocioId, numFoto) {
            try {
                const fotoComprimida = await comprimirFoto(file);
                const nombreArchivo = `negocio_${negocioId}_foto${numFoto}_${Date.now()}.jpg`;
                
                const { error: uploadError } = await db.storage
                    .from('negocios')
                    .upload(nombreArchivo, fotoComprimida);
                
                if (uploadError) throw uploadError;
                
                const { data: urlData } = db.storage
                    .from('negocios')
                    .getPublicUrl(nombreArchivo);
                
                const urlPublica = urlData.publicUrl;
                
                const { error: updateError } = await db
                    .from('negocios')
                    .update({ [`foto${numFoto}`]: urlPublica })
                    .eq('id', negocioId);
                
                if (updateError) throw updateError;
                
                console.log(`✅ Foto ${numFoto} guardada: ${urlPublica}`);
                return urlPublica;
                
            } catch (error) {
                console.error(`❌ Error en foto ${numFoto}:`, error);
                return null;
            }
        }

        function mostrarMensaje(msg, tipo) {
            const div = document.getElementById('mensajeResultado');
            div.style.display = 'block';
            div.className = `info-box ${tipo === 'error' ? 'error-box' : tipo === 'warning' ? 'warning-box' : 'success-box'}`;
            div.innerHTML = msg;
            setTimeout(() => {
                if (div.innerHTML === msg) div.style.display = 'none';
            }, 5000);
        }

        function mostrarCodigo(codigo, nombre, whatsapp) {
            const div = document.getElementById('codigoResultado');
            const urlWA = `https://wa.me/${whatsapp}?text=${encodeURIComponent(`🎉 "${nombre}" registrado en Santiago Market. Tu código es: ${codigo}. Guárdalo para editar tu negocio.`)}`;
            
            div.style.display = 'block';
            div.innerHTML = `
                <div style="font-size: 28px; font-weight: bold; color: #f1c40f;">🎉 ¡REGISTRADO!</div>
                <div style="font-size: 18px; margin: 10px 0;">Tu código de acceso es:</div>
                <span>${codigo}</span>
                <div style="font-size: 14px; margin-bottom: 20px;">📋 Guarda este código para editar tu negocio</div>
                <div>
                    <a href="${urlWA}" target="_blank" class="btn-wa">📱 ENVIAR POR WHATSAPP</a>
                    <button onclick="irATienda()" class="btn-tienda">← IR A LA TIENDA</button>
                </div>
            `;
            
            div.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
        
        function irATienda() {
            localStorage.setItem('volviendo_formulario', 'true');
            window.location.href = 'index.html';
        }

        function previewFoto(input, index) {
            if (input.files && input.files[0]) {
                fotosSeleccionadas[index] = input.files[0];
                const reader = new FileReader();
                reader.onload = (e) => {
                    const preview = document.getElementById(`preview-${index}`);
                    if (preview) preview.innerHTML = `<img src="${e.target.result}">`;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function agregarCampoFoto() {
            if (contadorFotos >= MAX_FOTOS) {
                mostrarMensaje(`Máximo ${MAX_FOTOS} fotos`, "error");
                return;
            }
            const container = document.getElementById('fotosContainer');
            const nuevoCampo = document.createElement('div');
            nuevoCampo.className = 'foto-item';
            nuevoCampo.innerHTML = `
                <input type="file" accept="image/*" onchange="previewFoto(this, ${contadorFotos})">
                <div class="preview-foto" id="preview-${contadorFotos}"></div>
            `;
            container.appendChild(nuevoCampo);
            contadorFotos++;
        }

        function marcarUbicacionComoConfirmada() {
            ubicacionConfirmada = true;
            const mapaDiv = document.getElementById('mapaUbicacion');
            mapaDiv.classList.add('ubicacion-confirmada');
            const advertencia = document.getElementById('ubicacionAdvertencia');
            advertencia.style.display = 'none';
        }

        function iniciarMapaSeleccion() {
            if (mapaInicializado) return;
            
            mapaSeleccion = L.map('mapaUbicacion').setView([centroSantiago.lat, centroSantiago.lng], 15);
            
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
            }).addTo(mapaSeleccion);
            
            marcadorSeleccion = L.marker([centroSantiago.lat, centroSantiago.lng], { 
                draggable: true,
                title: "Arrástrame hasta la ubicación de tu negocio"
            }).addTo(mapaSeleccion);
            
            marcadorSeleccion.on('dragend', function() {
                const pos = marcadorSeleccion.getLatLng();
                document.getElementById('latitud').value = pos.lat;
                document.getElementById('longitud').value = pos.lng;
                marcarUbicacionComoConfirmada();
                console.log("📍 Ubicación seleccionada:", pos.lat, pos.lng);
                mostrarMensaje("✅ Ubicación guardada correctamente", "success");
            });
            
            mapaSeleccion.on('click', function(e) {
                marcadorSeleccion.setLatLng(e.latlng);
                document.getElementById('latitud').value = e.latlng.lat;
                document.getElementById('longitud').value = e.latlng.lng;
                marcarUbicacionComoConfirmada();
                mostrarMensaje("✅ Ubicación seleccionada", "success");
            });
            
            mapaInicializado = true;
            document.getElementById('ubicacionAdvertencia').style.display = 'block';
        }
        
        function obtenerUbicacionActual() {
            if (navigator.geolocation) {
                mostrarMensaje("📍 Obteniendo tu ubicación...", "success");
                navigator.geolocation.getCurrentPosition((pos) => {
                    const lat = pos.coords.latitude;
                    const lng = pos.coords.longitude;
                    mapaSeleccion.setView([lat, lng], 16);
                    marcadorSeleccion.setLatLng([lat, lng]);
                    document.getElementById('latitud').value = lat;
                    document.getElementById('longitud').value = lng;
                    marcarUbicacionComoConfirmada();
                    mostrarMensaje("✅ Ubicación obtenida. Ajusta el marcador si es necesario.", "success");
                }, () => {
                    mostrarMensaje("❌ No se pudo obtener tu ubicación. Activa los permisos y mueve el marcador manualmente.", "error");
                });
            } else {
                mostrarMensaje("❌ Tu navegador no soporta geolocalización. Mueve el marcador manualmente.", "error");
            }
        }
        
        function centrarEnSantiago() {
            mapaSeleccion.setView([centroSantiago.lat, centroSantiago.lng], 15);
            marcadorSeleccion.setLatLng([centroSantiago.lat, centroSantiago.lng]);
            document.getElementById('latitud').value = centroSantiago.lat;
            document.getElementById('longitud').value = centroSantiago.lng;
            marcarUbicacionComoConfirmada();
            mostrarMensaje("📍 Centro de Santiago seleccionado. Ajusta el marcador a tu negocio.", "success");
        }

        function validarUbicacion() {
            const latitud = document.getElementById('latitud').value;
            const longitud = document.getElementById('longitud').value;
            
            if (!latitud || !longitud || latitud === "" || longitud === "" || latitud === "0" || longitud === "0") {
                mostrarMensaje("❌ Debes seleccionar la ubicación exacta en el mapa.\n\n1. Haz clic en 'Mi ubicación actual' o\n2. Arrastra el marcador 🟢 hasta tu negocio", "error");
                document.getElementById('mapaUbicacion').scrollIntoView({ behavior: 'smooth', block: 'center' });
                const mapaDiv = document.getElementById('mapaUbicacion');
                mapaDiv.style.border = "3px solid #ef4444";
                setTimeout(() => {
                    if (!ubicacionConfirmada) {
                        mapaDiv.style.border = "2px solid #ef4444";
                    }
                }, 2000);
                return false;
            }
            return true;
        }

        async function enviarFormulario() {
            const nombre = document.getElementById('nombreNegocio').value.trim();
            const categoria = document.getElementById('tipoNegocio').value;
            const direccion = document.getElementById('direccion').value.trim();
            const whatsapp = document.getElementById('whatsapp').value.trim();
            const descripcion = document.getElementById('queVendes').value;
            const mensajeria = document.getElementById('mensajeria').value;
            const pagos = document.getElementById('pagos').value;
            const latitud = document.getElementById('latitud').value || null;
            const longitud = document.getElementById('longitud').value || null;
            
            // Nuevos campos de horario
            const diasAtencionSelect = document.getElementById('diasAtencion');
            const diasAtencion = Array.from(diasAtencionSelect.selectedOptions).map(opt => opt.value);
            const horaApertura = document.getElementById('horaApertura').value;
            const horaCierre = document.getElementById('horaCierre').value;
            
            if (!nombre || !direccion || !whatsapp) {
                mostrarMensaje("Completa todos los campos obligatorios", "error");
                return;
            }
            
            if (diasAtencion.length === 0) {
                mostrarMensaje("Selecciona al menos un día de atención", "error");
                return;
            }
            
            if (!horaApertura || !horaCierre) {
                mostrarMensaje("Completa la hora de apertura y cierre", "error");
                return;
            }
            
            if (!validarUbicacion()) {
                return;
            }
            
            const fotosValidas = fotosSeleccionadas.filter(f => f !== undefined && f !== null);
            if (fotosValidas.length === 0) {
                mostrarMensaje("Selecciona al menos una foto", "error");
                return;
            }
            
            const btn = document.getElementById('btnRegistrar');
            btn.disabled = true;
            btn.innerText = "⏳ REGISTRANDO...";
            
            mostrarMensaje("Registrando negocio...", "success");
            
            try {
                const codigo = nombre.substring(0, 3).toUpperCase() + whatsapp.slice(-4) + Math.floor(Math.random() * 100);
                const linkGps = `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(direccion)}`;
                
                // Crear texto de horario para mostrar
                const horarioTexto = `${diasAtencion.join(', ')} de ${horaApertura} a ${horaCierre}`;
                
                const { data: negocioData, error: insertError } = await db
                    .from('negocios')
                    .insert({
                        nombre: nombre,
                        categoria: categoria,
                        direccion: direccion,
                        descripcion: descripcion,
                        horario: horarioTexto,
                        whatsapp: whatsapp,
                        codigo: codigo,
                        maps: linkGps,
                        mensajeria: mensajeria,
                        pagos: pagos,
                        latitud: latitud,
                        longitud: longitud,
                        hora_apertura: horaApertura,
                        hora_cierre: horaCierre,
                        dias_atencion: diasAtencion,
                        created_at: new Date().toISOString()
                    })
                    .select();
                
                if (insertError) throw insertError;
                
                const negocioId = negocioData[0].id;
                console.log("✅ Negocio creado, ID:", negocioId);
                
                let fotosGuardadas = 0;
                
                for (let i = 0; i < fotosValidas.length && i < 5; i++) {
                    const numFoto = i + 1;
                    const url = await subirFotoYGuardarEnTabla(fotosValidas[i], negocioId, numFoto);
                    if (url) fotosGuardadas++;
                    await new Promise(r => setTimeout(r, 500));
                }
                
                console.log(`✅ Total fotos guardadas: ${fotosGuardadas}`);
                
                mostrarMensaje(`✅ ¡Registro exitoso! ${fotosGuardadas} foto(s) guardada(s).`, "success");
                mostrarCodigo(codigo, nombre, whatsapp);
                
                document.getElementById('nombreNegocio').value = '';
                document.getElementById('direccion').value = '';
                document.getElementById('whatsapp').value = '';
                document.getElementById('queVendes').value = '';
                document.getElementById('horaApertura').value = '';
                document.getElementById('horaCierre').value = '';
                document.getElementById('diasAtencion').selectedIndex = -1;
                document.getElementById('fotosContainer').innerHTML = '';
                document.getElementById('latitud').value = '';
                document.getElementById('longitud').value = '';
                ubicacionConfirmada = false;
                document.getElementById('mapaUbicacion').classList.remove('ubicacion-confirmada');
                document.getElementById('mapaUbicacion').style.border = "2px solid #ef4444";
                document.getElementById('ubicacionAdvertencia').style.display = 'block';
                
                fotosSeleccionadas = [];
                contadorFotos = 0;
                agregarCampoFoto();
                localStorage.removeItem('santiago_market_cache');
                
                btn.disabled = false;
                btn.innerText = "🚀 INSCRIBIR";
                
            } catch (error) {
                console.error("❌ Error:", error);
                mostrarMensaje("Error: " + (error.message || "Intenta de nuevo"), "error");
                
                btn.disabled = false;
                btn.innerText = "🚀 INSCRIBIR";
            }
        }
        
        function cerrarFormularioYVolver() {
            localStorage.setItem('volviendo_formulario', 'true');
            window.location.href = 'index.html';
        }
        
        agregarCampoFoto();
        
        setTimeout(() => {
            if (document.getElementById('mapaUbicacion')) {
                iniciarMapaSeleccion();
            }
        }, 500);
    </script>
</body>
    </html>
